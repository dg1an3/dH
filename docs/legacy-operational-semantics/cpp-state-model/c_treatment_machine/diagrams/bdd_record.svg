<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="495px" preserveAspectRatio="none" style="width:545px;height:495px;background:#FFFFFF;" version="1.1" viewBox="0 0 545 495" width="545px" zoomAndPan="magnify"><title>&lt;&lt;bdd&gt;&gt; CTreatmentMachine record schema</title><defs/><g><!--bg-injected--><rect x=\"0\" y=\"0\" width=\"100%\" height=\"100%\" fill=\"#FFFFFF\"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="282.4199" x="124.7739" y="24.5332">&#171;bdd&#187; CTreatmentMachine record schema</text><!--class c_treatment_machine--><g id="elem_c_treatment_machine"><rect codeLine="21" fill="#FFE0B2" height="315.625" id="c_treatment_machine" rx="2.5" ry="2.5" style="stroke:#E65100;stroke-width:0.5;" width="193.2891" x="25" y="45.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="34.0254" x="104.6318" y="63.0664">&#171;root&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="134.627" x="54.3311" y="80.2363">c_treatment_machine</text><line style="stroke:#E65100;stroke-width:0.5;" x1="26" x2="217.2891" y1="88.3125" y2="88.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="140.834" x="31" y="128.4551">manufacturer : CString</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="96.4824" x="31" y="146.0645">model : CString</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.0615" x="31" y="163.6738">serial_number : CString</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="26" x2="54.3276" y1="105.1172" y2="105.1172"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="134.6338" x="54.3276" y="110.3457">machine identification</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="188.9614" x2="217.2891" y1="105.1172" y2="105.1172"/><line style="stroke:#E65100;stroke-width:1.0;" x1="26" x2="217.2891" y1="170.75" y2="170.75"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="76.2822" x="31" y="210.8926">sad : double</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="75.4961" x="31" y="228.502">scd : double</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="71.6064" x="31" y="246.1113">sid : double</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="26" x2="57.8379" y1="187.5547" y2="187.5547"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="127.6133" x="57.8379" y="192.7832">machine parameters</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="185.4512" x2="217.2891" y1="187.5547" y2="187.5547"/><line style="stroke:#E65100;stroke-width:1.0;" x1="26" x2="217.2891" y1="253.1875" y2="253.1875"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="144.7305" x="31" y="293.3301">projection : CMatrix&lt;4&gt;</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="26" x2="65.624" y1="269.9922" y2="269.9922"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="112.041" x="65.624" y="275.2207">derived (ctor only)</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="177.665" x2="217.2891" y1="269.9922" y2="269.9922"/><line style="stroke:#E65100;stroke-width:1.0;" x1="26" x2="217.2891" y1="300.4063" y2="300.4063"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="137.7236" x="31" y="318.9395">inherits CModelObject</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="108.1719" x="31" y="336.5488">public-field layout</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="181.2891" x="31" y="354.1582">serializable (omits projection)</text></g><!--class observable_in_name_only--><g id="elem_observable_in_name_only"><rect codeLine="40" fill="#F3E5F5" height="111.5313" id="observable_in_name_only" rx="2.5" ry="2.5" style="stroke:#7B1FA2;stroke-width:0.5;" width="201.1025" x="317.5" y="65.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="72.0527" x="382.0249" y="83.0664">&#171;observable&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="163.4473" x="336.3276" y="100.2363">observable_in_name_only</text><line style="stroke:#7B1FA2;stroke-width:0.5;" x1="318.5" x2="517.6025" y1="108.3125" y2="108.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="137.7236" x="323.5" y="126.8457">inherits CModelObject</text><line style="stroke:#7B1FA2;stroke-width:1.0;" x1="318.5" x2="517.6025" y1="133.9219" y2="133.9219"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="175.0273" x="323.5" y="152.4551">fires NOTHING in this class.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="189.1025" x="323.5" y="170.0645">Observable surface is unused.</text></g><!--class projection_stale_quirk--><g id="elem_projection_stale_quirk"><rect codeLine="49" fill="#FFCCCC" height="146.75" id="projection_stale_quirk" rx="2.5" ry="2.5" style="stroke:#C62828;stroke-width:0.5;" width="241.9678" x="297" y="213.1094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="39.3574" x="398.3052" y="230.5664">&#171;quirk&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="136.1924" x="349.8877" y="247.7363">projection_stale_quirk</text><line style="stroke:#C62828;stroke-width:0.5;" x1="298" x2="537.9678" y1="255.8125" y2="255.8125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="207.792" x="303" y="274.3457">set_sad / set_scd / set_sid do not</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="200.7715" x="303" y="291.9551">recompute projection. Projection</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="140.8408" x="303" y="309.5645">becomes stale silently.</text><line style="stroke:#C62828;stroke-width:1.0;" x1="298" x2="537.9678" y1="316.6406" y2="316.6406"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="217.1094" x="303" y="335.1738">serialize_load also omits projection</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="229.9678" x="303" y="352.7832">so post-load projection = ctor default.</text></g><g id="elem_GMN7"><path d="M6,396.6094 L6,488.3672 A0,0 0 0 0 6,488.3672 L237.2661,488.3672 A0,0 0 0 0 237.2661,488.3672 L237.2661,406.6094 L227.2661,396.6094 L126,396.6094 L122,361.6994 L118,396.6094 L6,396.6094 A0,0 0 0 0 6,396.6094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M227.2661,396.6094 L227.2661,406.6094 L237.2661,406.6094 L227.2661,396.6094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="172.6943" x="12" y="415.1045">Trivial glue-light. Seven public</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="154.6289" x="12" y="431.4561">fields, no setters in source.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="210.2661" x="12" y="447.8076">The modern Brimstone has no direct</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="190.0425" x="12" y="464.1592">descendant -- machine geometry</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="161.8652" x="12" y="480.5107">moved into kernel data files.</text></g><!--link c_treatment_machine to observable_in_name_only--><g id="link_c_treatment_machine_observable_in_name_only"><path codeLine="47" d="M218.17,121.6094 C249.95,121.6094 279.33,121.6094 311.38,121.6094 " fill="none" id="c_treatment_machine-to-observable_in_name_only" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="317.38,121.6094,308.38,117.6094,312.38,121.6094,308.38,125.6094,317.38,121.6094" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="53.46" x="268.78" y="122.6045">structural</text></g><!--link c_treatment_machine to projection_stale_quirk--><g id="link_c_treatment_machine_projection_stale_quirk"><path codeLine="58" d="M218.17,286.6094 C243.27,286.6094 264.62,286.6094 290.8,286.6094 " fill="none" id="c_treatment_machine-to-projection_stale_quirk" style="stroke:#181818;stroke-width:1.0;stroke-dasharray:7.0,7.0;"/><polygon fill="#181818" points="296.8,286.6094,287.8,282.6094,291.8,286.6094,287.8,290.6094,296.8,286.6094" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="111.2681" x="145.49" y="301.1045">preserved verbatim</text></g><!--SRC=[XLNRJXin47tVhnYf3u14jY4j5A4qKW6fHIfGANbVUUtPh1jVKdkMDg3-UyUxkH4ITPyi-ynuvfmptYCOB-BzTxWsNixW5YljD6dlu5QBQH0sEuAnhD4Ag7m0gX5k9W45MNHqBsIj7K90wOE2O-iLcbvih1LXaV3s5AQcmPxHqvfEyYmZJGPXE2oL6eqEPuhjZLaMPzhD1LS1qeWOuIK3_gw5d4s3Rvo