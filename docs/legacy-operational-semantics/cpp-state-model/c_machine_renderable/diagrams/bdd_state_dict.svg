e:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="167.0098" x2="271.5508" y1="140.3359" y2="140.3359"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="246.6475" x="13" y="202.8926">wireframe_mode : bool (always FALSE)</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="8" x2="83.355" y1="179.5547" y2="179.5547"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="112.8408" x="83.355" y="184.7832">dead code marker</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="196.1958" x2="271.5508" y1="179.5547" y2="179.5547"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="114.4131" x="13" y="242.1113">table_drawn : bool</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="122.9648" x="13" y="259.7207">gantry_drawn : bool</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="143.958" x="13" y="277.3301">collimator_drawn : bool</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="8" x2="103.979" y1="218.7734" y2="218.7734"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="71.5928" x="103.979" y="224.002">drawn flags</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="175.5718" x2="271.5508" y1="218.7734" y2="218.7734"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="171.7734" x="13" y="316.5488">sad_cached : double | none</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="170.9873" x="13" y="334.1582">scd_cached : double | none</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="237.125" x="13" y="351.7676">axis_to_collim_cached : double | none</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="230.1523" x="13" y="369.377">gantry_angle_cached : double | none</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="8" x2="11" y1="293.2109" y2="293.2109"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="257.5508" x="11" y="298.4395">derived rendering parameters (per-frame)</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="268.5508" x2="271.5508" y1="293.2109" y2="293.2109"/></g><!--class MachineMode--><g id="elem_MachineMode"><rect codeLine="35" fill="#FFF9C4" height="103.5313" id="MachineMode" rx="2.5" ry="2.5" style="stroke:#F9A825;stroke-width:0.5;" width="93.9375" x="516" y="75.1094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="80.0566" x="522.9404" y="92.5664">&#171;enumeration&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="87.9375" x="519" y="109.7363">MachineMode</text><line style="stroke:#F9A825;stroke-width:0.5;" x1="517" x2="608.9375" y1="117.8125" y2="117.8125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="54.5029" x="522" y="136.3457">unbound</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="38.9307" x="522" y="153.9551">bound</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="61.4824" x="522" y="171.5645">destroyed</text></g><!--class wireframe_quirk--><g id="elem_wireframe_quirk"><rect codeLine="41" fill="#FFCCCC" height="164.3594" id="wireframe_quirk" rx="2.5" ry="2.5" style="stroke:#C62828;stroke-width:0.5;" width="264.4033" x="431" y="214.1094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="66.0645" x="530.1694" y="231.5664">&#171;deadcode&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="99.5859" x="513.4087" y="248.7363">wireframe_quirk</text><line style="stroke:#C62828;stroke-width:0.5;" x1="432" x2="694.4033" y1="256.8125" y2="256.8125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="220.1719" x="437" y="275.3457">m_bWireFrame is initialized FALSE</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="189.8613" x="437" y="292.9551">in the ctor and NEVER written.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="179.7783" x="437" y="310.5645">is dead code. The advertised</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="187.3457" x="437" y="328.1738">"wireframe rendering mode" is</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="165.7715" x="437" y="345.7832">non-functional in this build.</text><line style="stroke:#C62828;stroke-width:0.5;" x1="432" x2="694.4033" y1="352.8594" y2="352.8594"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="252.4033" x="437" y="371.3926">DrawOpaque body's `if(m_bWireFrame)`</text></g><g id="elem_GMN7"><path d="M33,412.1094 L33,503.8672 A0,0 0 0 0 33,503.8672 L246.937,503.8672 A0,0 0 0 0 246.937,503.8672 L246.937,422.1094 L236.937,412.1094 L144,412.1094 L140,376.9094 L136,412.1094 L33,412.1094 A0,0 0 0 0 33,412.1094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M236.937,412.1094 L236.937,422.1094 L246.937,422.1094 L236.937,412.1094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="192.937" x="39" y="430.6045">Smaller than BeamRenderable (3</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="181.7017" x="39" y="446.9561">Draw* helpers vs 6+). Observer</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="153.8989" x="39" y="463.3076">callback is `Invalidate` (not</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.1543" x="39" y="479.6592">a custom OnBeamChanged) per</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="61.4326" x="39" y="496.0107">cpp:91-92.</text></g><!--link state to MachineMode--><g id="link_state_MachineMode"><path codeLine="50" d="M273.05,184.7594 C356.01,168.2094 457.93,147.8794 515.88,136.3094 " fill="none" id="state-MachineMode" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="19.5063" x="342.5" y="158.6045">win</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="7.23" x="280.5361" y="197.2649">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="7.23" x="500.8357" y="152.6111">1</text></g><!--link state to wireframe_quirk--><g id="link_state_wireframe_quirk"><path codeLine="51" d="M273.05,237.7694 C323.33,247.9194 374.6988,258.2914 424.8988,268.4314 " fill="none" id="state-to-wireframe_quirk" style="stroke:#181818;stroke-width:1.0;stroke-dasharray:7.0,7.0;"/><polygon fill="#181818" points="430.78,269.6194,422.7501,263.9166,425.879,268.6294,421.1662,271.7582,430.78,269.6194" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="96.8145" x="304" y="241.6045">wireframe_mode</text></g><!--SRC=[VLJlJzim4FsUl-BKVLZBrAfq0z6gGe8E9AGn99YsZwrZNnghZXrifrt7-DztZliZK4Q-r8tVlRjxzovUUeKm7gT2d9_3v9RnN6gyHotGif