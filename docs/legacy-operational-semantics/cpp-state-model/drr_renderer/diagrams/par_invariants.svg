<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="563px" preserveAspectRatio="none" style="width:1253px;height:563px;background:#FFFFFF;" version="1.1" viewBox="0 0 1253 563" width="1253px" zoomAndPan="magnify"><title>&lt;&lt;par&gt;&gt; CDRRRenderer Constraints and Invariants</title><defs/><g><!--bg-injected--><rect x=\"0\" y=\"0\" width=\"100%\" height=\"100%\" fill=\"#FFFFFF\"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="323.6406" x="457.8071" y="24.5332">&#171;par&#187; CDRRRenderer Constraints and Invariants</text><!--class compute_drr_gate--><g id="elem_compute_drr_gate"><rect codeLine="17" fill="#FFFFCC" height="207.5781" id="compute_drr_gate" rx="2.5" ry="2.5" style="stroke:#999900;stroke-width:0.5;" width="313.9502" x="55" y="45.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="65.373" x="179.2886" y="63.0664">&#171;constraint&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="113.627" x="155.1616" y="80.2363">compute_drr_gate</text><line style="stroke:#999900;stroke-width:0.5;" x1="56" x2="367.9502" y1="88.3125" y2="88.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="182.082" x="61" y="106.8457">parameters: state.for_volume</text><line style="stroke:#999900;stroke-width:1.0;" x1="56" x2="367.9502" y1="113.9219" y2="113.9219"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="96.4893" x="61" y="132.4551">Validation-time:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="154.4854" x="61" y="150.0645">state.for_volume != none</text><line style="stroke:#999900;stroke-width:1.0;" x1="56" x2="367.9502" y1="157.1406" y2="157.1406"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="301.9502" x="61" y="175.6738">Enforced by: ui_state_dcg.step//2 [compute_drr],</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="203.8887" x="61" y="193.2832">edit_ops:compute_drr/2 first goal</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="256.0127" x="61" y="210.8926">Rationale: ComputeDRR (cpp:247) reads</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="245.5059" x="61" y="228.502">forVolume-&gt;width.Get() unconditionally;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.2891" x="61" y="246.1113">NULL deref otherwise.</text></g><!--class draw_scene_gate--><g id="elem_draw_scene_gate"><rect codeLine="30" fill="#FFFFCC" height="172.3594" id="draw_scene_gate" rx="2.5" ry="2.5" style="stroke:#999900;stroke-width:0.5;" width="333.3779" x="404.5" y="63.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="65.373" x="538.5024" y="81.0664">&#171;constraint&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.5234" x="515.9272" y="98.2363">draw_scene_gate</text><line style="stroke:#999900;stroke-width:0.5;" x1="405.5" x2="736.8779" y1="106.3125" y2="106.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="182.082" x="410.5" y="124.8457">parameters: state.for_volume</text><line style="stroke:#999900;stroke-width:1.0;" x1="405.5" x2="736.8779" y1="131.9219" y2="131.9219"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="96.4893" x="410.5" y="150.4551">Validation-time:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="321.3779" x="410.5" y="168.0645">DrawScene short-circuits when for_volume == none</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="59.1445" x="410.5" y="185.6738">(cpp:466)</text><line style="stroke:#999900;stroke-width:1.0;" x1="405.5" x2="736.8779" y1="192.75" y2="192.75"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="299.6123" x="410.5" y="211.2832">Enforced by: edit_ops:draw_scene/2 first branch</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="277.0332" x="410.5" y="228.8926">Rationale: harmless no-op rather than crash.</text></g><!--class clip_raster_correctness--><g id="elem_clip_raster_correctness"><rect codeLine="41" fill="#F3E5F5" height="189.9688" id="clip_raster_correctness" rx="2.5" ry="2.5" style="stroke:#7B1FA2;stroke-width:0.5;" width="363.3057" x="772.5" y="54.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="58.7051" x="924.8003" y="72.0664">&#171;invariant&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="144.7236" x="881.791" y="89.2363">clip_raster_correctness</text><line style="stroke:#7B1FA2;stroke-width:0.5;" x1="773.5" x2="1134.8057" y1="97.3125" y2="97.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="284.0332" x="778.5" y="115.8457">parameters: clip_raster output post-conditions</text><line style="stroke:#7B1FA2;stroke-width:1.0;" x1="773.5" x2="1134.8057" y1="122.9219" y2="122.9219"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="252.1094" x="778.5" y="141.4551">State-time (per ClipRaster cpp:231-234):</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="81.7168" x="778.5" y="159.0645">on Ok==true:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="239.6338" x="778.5" y="176.6738">Start[axis] &gt;&gt; 16 in [SrcMin, SrcMax-1]</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="351.3057" x="778.5" y="194.2832">(Start + DestLen*Step)[axis] &gt;&gt; 16 in [SrcMin, SrcMax-1]</text><line style="stroke:#7B1FA2;stroke-width:1.0;" x1="773.5" x2="1134.8057" y1="201.3594" y2="201.3594"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="291.0332" x="778.5" y="219.8926">Preserved by: clip_raster_pipeline:clip_raster/7</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="290.2607" x="778.5" y="237.502">Documents the four ASSERTs at cpp:231-234.</text></g><!--class thread_lifecycle--><g id="elem_thread_lifecycle"><rect codeLine="53" fill="#F3E5F5" height="225.1875" id="thread_lifecycle" rx="2.5" ry="2.5" style="stroke:#7B1FA2;stroke-width:0.5;" width="410.0635" x="7" y="322.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="58.7051" x="182.6792" y="340.0664">&#171;invariant&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="97.2754" x="163.394" y="357.2363">thread_lifecycle</text><line style="stroke:#7B1FA2;stroke-width:0.5;" x1="8" x2="416.0635" y1="365.3125" y2="365.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="288.7295" x="13" y="383.8457">parameters: state.thread_running, state.thread</text><line style="stroke:#7B1FA2;stroke-width:1.0;" x1="8" x2="416.0635" y1="390.9219" y2="390.9219"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="67.6895" x="13" y="409.4551">State-time:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="142.4404" x="13" y="427.0645">thread_running == true</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="398.0635" x="13" y="444.6738">&lt;==&gt; thread != none AND CWinThread is suspended-or-running</text><line style="stroke:#7B1FA2;stroke-width:1.0;" x1="8" x2="416.0635" y1="451.75" y2="451.75"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="311.3154" x="13" y="470.2832">Preserved by: edit_ops:abort_thread_if_running/2,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="375.1699" x="13" y="487.8926">bg_thread_started, bg_thread_complete, bg_thread_aborted</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="363.8018" x="13" y="505.502">Maintainers: every code path that sets m_pThread = NULL</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="311.2744" x="13" y="523.1113">must be reflected here. Three duplicates in source</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="200.04" x="13" y="540.7207">at cpp:75-77, 470-472, 553-556.</text></g><!--class recompute_dirty_discipline--><g id="elem_recompute_dirty_discipline"><rect codeLine="67" fill="#F3E5F5" height="207.5781" id="recompute_dirty_discipline" rx="2.5" ry="2.5" style="stroke:#7B1FA2;stroke-width:0.5;" width="408.4912" x="452" y="331.1094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="58.7051" x="626.8931" y="348.5664">&#171;invariant&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="165.751" x="573.3701" y="365.7363">recompute_dirty_discipline</text><line style="stroke:#7B1FA2;stroke-width:0.5;" x1="453" x2="859.4912" y1="373.8125" y2="373.8125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="241.999" x="458" y="392.3457">parameters: state.recompute, state.win</text><line style="stroke:#7B1FA2;stroke-width:1.0;" x1="453" x2="859.4912" y1="399.4219" y2="399.4219"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="67.6895" x="458" y="417.9551">State-time:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="226.4678" x="458" y="435.5645">win == dirty &lt;==&gt; recompute == true</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="258.7744" x="458" y="453.1738">win == computed ==&gt; recompute == false</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="396.4912" x="458" y="470.7832">win == bg_computing ==&gt; recompute is irrelevant (thread owns)</text><line style="stroke:#7B1FA2;stroke-width:1.0;" x1="453" x2="859.4912" y1="477.8594" y2="477.8594"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="337.6885" x="458" y="496.3926">Set by: ctor (true), set_volume, set_volume_transform,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="192.2471" x="458" y="514.002">on_camera_projection_change</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="332.2881" x="458" y="531.6113">Cleared by: compute_drr (false), bg_thread_complete</text></g><!--class historical_marker--><g id="elem_historical_marker"><rect codeLine="80" fill="#F3E5F5" height="242.7969" id="historical_marker" rx="2.5" ry="2.5" style="stroke:#7B1FA2;stroke-width:0.5;" width="350.7549" x="895.5" y="313.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="58.7051" x="1041.5249" y="331.0664">&#171;invariant&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="106.5859" x="1017.5845" y="348.2363">historical_marker</text><line style="stroke:#7B1FA2;stroke-width:0.5;" x1="896.5" x2="1245.2549" y1="356.3125" y2="356.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="142.3926" x="901.5" y="374.8457">parameters: source file</text><line style="stroke:#7B1FA2;stroke-width:1.0;" x1="896.5" x2="1245.2549" y1="381.9219" y2="381.9219"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="67.6895" x="901.5" y="400.4551">State-time:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="296.4814" x="901.5" y="418.0645">The whole file is preserved verbatim despite the</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="338.7549" x="901.5" y="435.6738">"HISTORICAL FILE - Restored from commit 40e1350a</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="284.3135" x="901.5" y="453.2832">(June 7, 2002) - This file is NOT built" header.</text><line style="stroke:#7B1FA2;stroke-width:1.0;" x1="896.5" x2="1245.2549" y1="460.3594" y2="460.3594"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="333.7852" x="901.5" y="478.8926">Rationale: per DEVELOPMENT_TIMELINE.md Part 7</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="252.0957" x="901.5" y="496.502">Direction C, frozen historical sources are</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="278.5234" x="901.5" y="514.1113">legitimate LTS targets -- the bisimilarity claim</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="325.2949" x="901.5" y="531.7207">against modern Brimstone/CPlanarView depends on</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="249.0674" x="901.5" y="549.3301">having a parsable, modeled antecedent.</text></g><!--SRC=[jLRVS-8s47xdhzXU7WvQJ0W9OKf3Pku8RTCXFmPe-f2vyGXvmMfaoIF9uMYd_tjNiY7cBdUzbtec0UnTQVVxlltajp3Vsfift3F3CdH6SBWIR4q_6czXRBIrqKgWJ42ePsO4Kyu2KmbmhQmpJFZVAsrWV3MRpL0bQD1q6Wqdd4IukCYPkRmyU0ZZMgPVwNg_SADXduJAVIN09RCM_cu0NUyPVreRNQXahAKs5nSlczFYHokwE2yZjQ5DNelorz6FT7Mxhw-vxyy77wrEiR_gVxxcGLHOSx0yMR5Uuvz6AX84BWoNM7x7B7TR851JdTXQQpPbYTu8jOOLanORJkVWD2orSpg3H1ZaJcZLQ9GOS9tbXSCuCIPUC-THFUYin2Wl-KDZXs0TXNM8bVXPooB34115uUE1IP4mltxaH8R3SFFJ1FXk14ghWyI9ekSS4rXkXr28EEJ42LzthCFy-BW7ZxLAFxH34YR2nJgtmzeZYbm9OnsiDPCXQXRgOHA798uGHtg19i_pOUziq0A3Z03qaLJ2GwWmkjo8nAMTNz0rMr0eGeIs2gl8xKyXzlRtwHIyv5QWNOfc8onsYASAriImJMmvAlo_KBsY7UP-0s9S6nTvRHI2LBz9KK4DxL4DxT3rsVbvwulOxp5zwM0FwT8mnTDFGKsPoIHIpqf7f3N3F1pWKgQ06sRJ6YfSYZocUzHopBNnKbG-yr3vduDJomDTEE8GScsfvnqljjxFt4CPa89cxYs1icTbSY3zz2JgdPwrIXYrWhkdqSYPeiArNC2uH_PHs0z0zPoSapt1uzpm6w7Qu3_Pn-Zamowy6UBX1xX2wwQelf-JP5lVc5_LV6_GedckIAZZb8iSfL0uhDqy7fGIq9m8zav7a1FbXO5ty_bajY3hS_LUQnIurEizbcA5VCk3YtuT-rAOLPefb29hQH_SVHtx4it3FAz5Z_GEkOlHwB8AsPa2lBkzWl4VGYtAsyA2BMpkxJs9j8cgbRwCtLx0R4bZ4LS5YDMkXkDUQHxBzUwPzVHXqgxTyeOY2O3wlR0UbjtU-3cclu0GFgFPaf6IAUSaVYzz1nQ9bYpEgpP6mJ12RbRuKKBodPMa0Q2oQLwm0puI8IboAJY1QBreB77AIxWgHWVzQ31emzcW6vqDUctezq-ZVl-ynZ1DrSuEXN5R-c-voBs4lf7h_G8xckaq-Hh7zDWJ6tOhATslS41u5LSz8am-ZImFh5eeWLy-BhLJ3oTT238GYS_K33Gh4UcDiWVUDaTNJfIZjuYcBwNLzjnKvbZ_7fCxAqjMcBLt-eJI8M9E21aMvqR_MPwUCITxMvUrZYKoinlSbuC8cg6TrckoUY4h5POg8y9bd37pH1Rrdnm5IP0ZI_mQAGjoX4sgPHdfuShtOq9wNP9_qzi0sbmGc6GV8UdDhzVpnTtiUlnk2ZzVJoSGmGnzWPIqClJwG0rami5P5qzE-rrMdYc_5IGjqcIls-srA6L1JUrtlRrRmB8GqhqXcRF4lxxLgguT8zwfhoOFa-dT_StaTX4lhcycq-lRIITB_EkZWyhpTYymC6xxclwYm-u5n0eTyZzJTYHnJGT4ve_WwM8EDEbhFvXH52npAQp8X2IqIRb4YCZAKLlJQDEGPZJIHi5x8pBQW0x2yRraYfa7WHl2pfkI9Nc4d9GzUv4opvLbIqdIykcIa2CcaOvNCce_fVy2]--></g></svg>