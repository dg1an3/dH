<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="494px" preserveAspectRatio="none" style="width:586px;height:494px;background:#FFFFFF;" version="1.1" viewBox="0 0 586 494" width="586px" zoomAndPan="magnify"><title>&lt;&lt;bdd&gt;&gt; CPlan record schema</title><defs/><g><!--bg-injected--><rect x=\"0\" y=\"0\" width=\"100%\" height=\"100%\" fill=\"#FFFFFF\"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="188.2891" x="192.1895" y="24.5332">&#171;bdd&#187; CPlan record schema</text><!--class c_plan--><g id="elem_c_plan"><rect codeLine="21" fill="#FFE0B2" height="217.1875" id="c_plan" rx="2.5" ry="2.5" style="stroke:#E65100;stroke-width:0.5;" width="215.8955" x="29" y="126.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="34.0254" x="119.9351" y="144.0664">&#171;root&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="41.2549" x="116.3203" y="161.2363">c_plan</text><line style="stroke:#E65100;stroke-width:0.5;" x1="30" x2="243.8955" y1="169.3125" y2="169.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="170.9395" x="35" y="187.8457">series_ref : CSeries* | none</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="142.3857" x="35" y="205.4551">beams : list of CBeam*</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="117.5098" x="35" y="223.0645">dose_valid : BOOL</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="203.8955" x="35" y="240.6738">dose_matrix : CVolume&lt;double&gt;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="156.3994" x="35" y="258.2832">series_filename : CString</text><line style="stroke:#E65100;stroke-width:1.0;" x1="30" x2="243.8955" y1="265.3594" y2="265.3594"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="122.9375" x="35" y="283.8926">inherits CDocument</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="203.0889" x="35" y="301.502">NOT observable; AddBeam calls</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="199.958" x="35" y="319.1113">UpdateAllViews(NULL) explicitly</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="70.0342" x="35" y="336.7207">serializable</text></g><!--class c_plan_static--><g id="elem_c_plan_static"><rect codeLine="34" fill="#FCE4EC" height="129.1406" id="c_plan_static" rx="2.5" ry="2.5" style="stroke:#C62828;stroke-width:0.5;" width="251.668" x="328" y="45.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="67.3652" x="420.1514" y="63.0664">&#171;staticField&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="81.7168" x="412.9756" y="80.2363">c_plan_static</text><line style="stroke:#C62828;stroke-width:0.5;" x1="329" x2="578.668" y1="88.3125" y2="88.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="239.668" x="334" y="106.8457">series_doc_template : CDocTemplate*</text><line style="stroke:#C62828;stroke-width:1.0;" x1="329" x2="578.668" y1="113.9219" y2="113.9219"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="123.6963" x="334" y="132.4551">static class member</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="169.6543" x="334" y="150.0645">used by OnOpenDocument</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="127.6201" x="334" y="167.6738">to hydrate series_ref</text></g><!--class c_series--><g id="elem_c_series"><rect codeLine="44" fill="#E3F2FD" height="50.7031" id="c_series" rx="2.5" ry="2.5" style="stroke:#1565C0;stroke-width:0.5;" width="76.0391" x="416" y="209.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="74.0391" x="417" y="227.0664">&#171;recordType&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="52.1309" x="427.9541" y="244.2363">c_series</text><line style="stroke:#1565C0;stroke-width:0.5;" x1="417" x2="491.0391" y1="252.3125" y2="252.3125"/></g><!--class c_beam--><g id="elem_c_beam"><rect codeLine="45" fill="#E3F2FD" height="50.7031" id="c_beam" rx="2.5" ry="2.5" style="stroke:#1565C0;stroke-width:0.5;" width="76.0391" x="416" y="295.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="74.0391" x="417" y="313.0664">&#171;recordType&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="49.8066" x="429.1162" y="330.2363">c_beam</text><line style="stroke:#1565C0;stroke-width:0.5;" x1="417" x2="491.0391" y1="338.3125" y2="338.3125"/></g><g id="elem_GMN9"><path d="M6,379.1094 L6,487.2188 A0,0 0 0 0 6,487.2188 L267.6587,487.2188 A0,0 0 0 0 267.6587,487.2188 L267.6587,389.1094 L257.6587,379.1094 L141,379.1094 L137,343.6694 L133,379.1094 L6,379.1094 A0,0 0 0 0 6,379.1094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M257.6587,379.1094 L257.6587,389.1094 L267.6587,389.1094 L257.6587,379.1094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="214.2397" x="12" y="397.6045">Glue-light: pure record + side-effects.</text><text