<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="619px" preserveAspectRatio="none" style="width:1085px;height:619px;background:#FFFFFF;" version="1.1" viewBox="0 0 1085 619" width="1085px" zoomAndPan="magnify"><title>&lt;&lt;bdd&gt;&gt; CBeamRenderable state{} dict schema</title><defs/><g><!--bg-injected--><rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="301.8887" x="385.0029" y="24.5332">&#171;bdd&#187; CBeamRenderable state{} dict schema</text><!--class state--><g id="elem_state"><rect codeLine="17" fill="#FFE0B2" height="422.8906" id="state" rx="2.5" ry="2.5" style="stroke:#E65100;stroke-width:0.5;" width="419.7842" x="7" y="45.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="34.0254" x="199.8794" y="63.0664">&#171;root&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="30.3516" x="201.7163" y="80.2363">state</text><line style="stroke:#E65100;stroke-width:0.5;" x1="8" x2="425.7842" y1="88.3125" y2="88.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="104.2686" x="13" y="106.8457">win : BeamMode</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="149.167" x="13" y="124.4551">pbeam : CBeam* | none</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="119.7998" x="13" y="142.0645">color : COLORREF</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="87.9648" x="13" y="159.6738">alpha : double</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="321.3848" x="13" y="198.8926">central_axis_enabled : bool (TRUE; never read live)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="305.8398" x="13" y="216.502">graticule_enabled : bool (FALSE; never read live)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="396.1221" x="13" y="234.1113">field_divergence_surfaces_enabled : bool (FALSE; body empty)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="407.7842" x="13" y="251.7207">block_divergence_surfaces_enabled : bool (TRUE; the only LIVE)</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="8" x2="110.2686" y1="175.5547" y2="175.5547"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="213.2471" x="110.2686" y="180.7832">4 toggle flags (3 functionally dead)</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="323.5156" x2="425.7842" y1="175.5547" y2="175.5547"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="133.834" x="13" y="290.9395">v_min : CVectorD&lt;2&gt;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="137.7236" x="13" y="308.5488">v_max : CVectorD&lt;2&gt;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="197.6406" x="13" y="326.1582">v_min_x_max_y : CVectorD&lt;2&gt;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="197.6406" x="13" y="343.7676">v_max_x_min_y : CVectorD&lt;2&gt;</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="8" x2="42.5928" y1="267.6016" y2="267.6016"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="348.5986" x="42.5928" y="272.8301">collimator-corner cache (set in dead code, stays at zero)</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="391.1914" x2="425.7842" y1="267.6016" y2="267.6016"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="280.6563" x="13" y="382.9863">block_div_surf_mesh : LPD3DXMESH | none</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="8" x2="92.0029" y1="359.6484" y2="359.6484"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="249.7783" x="92.0029" y="364.877">D3D8 mesh (the LIVE rendering artifact)</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="341.7813" x2="425.7842" y1="359.6484" y2="359.6484"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="206.1719" x="13" y="422.2051">modelview_matrix : CMatrixD&lt;4&gt;</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="8" x2="93.1514" y1="398.8672" y2="398.8672"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="247.4814" x="93.1514" y="404.0957">recomputed on every OnBeamChanged</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="340.6328" x2="425.7842" y1="398.8672" y2="398.8672"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="154.1025" x="13" y="461.4238">observer_attached : bool</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="8" x2="189.6577" y1="438.0859" y2="438.0859"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="54.4688" x="189.6577" y="443.3145">observer</text><line style="stroke:#E65100;stroke-width:1.0;stroke-dasharray:1.0,2.0;" x1="244.1265" x2="425.7842" y1="438.0859" y2="438.0859"/></g><!--class BeamMode--><g id="elem_BeamMode"><rect codeLine="40" fill="#FFF9C4" height="121.1406" id="BeamMode" rx="2.5" ry="2.5" style="stroke:#F9A825;stroke-width:0.5;" width="99.165" x="776" y="98.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="80.0566" x="785.5542" y="116.0664">&#171;enumeration&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="71.5928" x="789.7861" y="133.2363">BeamMode</text><line style="stroke:#F9A825;stroke-width:0.5;" x1="777" x2="874.165" y1="141.3125" y2="141.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="54.5029" x="782" y="159.8457">unbound</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="38.9307" x="782" y="177.4551">bound</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="87.165" x="782" y="195.0645">mesh_cached</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="61.4824" x="782" y="212.6738">destroyed</text></g><!--class dead_code_dominance--><g id="elem_dead_code_dominance"><rect codeLine="47" fill="#FFCCCC" height="199.5781" id="dead_code_dominance" rx="2.5" ry="2.5" style="stroke:#C62828;stroke-width:0.5;" width="506.8945" x="572" y="255.1094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="66.0645" x="792.415" y="272.5664">&#171;deadcode&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="145.5645" x="752.665" y="289.7363">dead_code_dominance</text><line style="stroke:#C62828;stroke-width:0.5;" x1="573" x2="1077.8945" y1="297.8125" y2="297.8125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="388.3086" x="578" y="316.3457">DrawOpaque body: ENTIRELY commented out (cpp:192-241).</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="494.8945" x="578" y="333.9551">DrawFieldDivergenceSurfaces body: ENTIRELY commented out (cpp:469-478).</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="245.0547" x="578" y="351.5645">DrawGraticule, DrawField, DrawBlocks,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="283.2129" x="578" y="369.1738">DrawCentralAxis, DrawFieldDivergenceLines:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="283.3018" x="578" y="386.7832">defined but only called by dead DrawOpaque.</text><line style="stroke:#C62828;stroke-width:1.0;" x1="573" x2="1077.8945" y1="393.8594" y2="393.8594"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="302.2988" x="578" y="412.3926">Migration leftover: CRenderContext (OpenGL) -&gt;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="232.6133" x="578" y="430.002">LPDIRECT3DDEVICE8 (D3D8). Only</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="252.875" x="578" y="447.6113">DrawBlockDivergenceSurfaces survived.</text></g><g id="elem_GMN7"><path d="M103.5,504.1094 L103.5,612.2188 A0,0 0 0 0 103.5,612.2188 L330.4243,612.2188 A0,0 0 0 0 330.4243,612.2188 L330.4243,514.1094 L320.4243,504.1094 L221,504.1094 L217,468.8194 L213,504.1094 L103.5,504.1094 A0,0 0 0 0 103.5,504.1094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M320.4243,504.1094 L320.4243,514.1094 L330.4243,514.1094 L320.4243,504.1094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="205.9243" x="109.5" y="522.6045">The largest renderable in RT_VIEW</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.1543" x="109.5" y="538.9561">by source line count, but most of</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="174.1289" x="109.5" y="555.3076">the bulk is preserved-verbatim</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="164.7598" x="109.5" y="571.6592">dead code from a partial API</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="184.9834" x="109.5" y="588.0107">migration. The actual LIVE state</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="93.1899" x="109.5" y="604.3623">surface is small.</text></g><!--link state to BeamMode--><g id="link_state_BeamMode"><path codeLine="59" d="M427.15,223.3194 C552.17,203.1094 700.88,179.0894 775.96,166.9494 " fill="none" id="state-BeamMode" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="19.5063" x="490" y="202.6045">win</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="7.23" x="434.8361" y="235.8959">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="7.23" x="760.8432" y="182.8861">1</text></g><!--link state to dead_code_dominance--><g id="link_state_dead_code_dominance"><path codeLine="60" d="M427.15,290.8994 C473.82,298.4494 517.8669,305.5621 566.0669,313.3521 " fill="none" id="state-to-dead_code_dominance" style="stroke:#181818;stroke-width:1.0;stroke-dasharray:7.0,7.0;"/><polygon fill="#181818" points="571.99,314.3094,563.7435,308.9247,567.054,313.5116,562.4671,316.8222,571.99,314.3094" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="83.1099" x="458" y="294.6045">surrounded by</text></g><!--SRC=[ZLLHRnev47xVNp7glS09K49eIZWKAG7I8f6Z