00" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.2134" x="510" y="316.8623">dead code preserved verbatim.</text></g><g id="elem_GMN18"><path d="M463.5,418.6094 L463.5,543.0703 L694.0234,543.0703 L694.0234,428.6094 L684.0234,418.6094 L463.5,418.6094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M684.0234,418.6094 L684.0234,428.6094 L694.0234,428.6094 L684.0234,418.6094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="209.5234" x="469.5" y="437.1045">Only DrawBlockDivergenceSurfaces</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.9307" x="469.5" y="453.4561">(cpp:487-541) actually renders.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.9116" x="469.5" y="469.8076">Mesh cache is NOT invalidated</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="151.0425" x="469.5" y="486.1592">by on_beam_changed -- if</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="165.4771" x="469.5" y="502.5107">block 0 vertices change after</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="182.8379" x="469.5" y="518.8623">caching, the cached mesh goes</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="130.7744" x="469.5" y="535.2139">stale. Quirk preserved.</text></g><!--link Bound to Cached--><g id="link_Bound_Cached"><path d="M96.48,295.8794 C93.98,335.9594 89.3845,409.5311 86.8845,449.5111 " fill="none" id="Bound-to-Cached" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="86.51,455.4994,91.0639,446.7666,86.822,450.5091,83.0795,446.2673,86.51,455.4994" style="stroke:#181818;stroke-width:1.0;"/><