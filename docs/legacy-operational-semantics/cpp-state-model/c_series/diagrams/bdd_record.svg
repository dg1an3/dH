<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="343px" preserveAspectRatio="none" style="width:273px;height:343px;background:#FFFFFF;" version="1.1" viewBox="0 0 273 343" width="273px" zoomAndPan="magnify"><title>&lt;&lt;bdd&gt;&gt; CSeries record schema</title><defs/><g><!--bg-injected--><rect x=\"0\" y=\"0\" width=\"100%\" height=\"100%\" fill=\"#FFFFFF\"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="200.7578" x="29.5696" y="24.5332">&#171;bdd&#187; CSeries record schema</text><!--class c_series--><g id="elem_c_series"><rect codeLine="19" fill="#FFE0B2" height="164.3594" id="c_series" rx="2.5" ry="2.5" style="stroke:#E65100;stroke-width:0.5;" width="254.0127" x="9.5" y="45.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="34.0254" x="119.4937" y="63.0664">&#171;root&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="52.1309" x="110.4409" y="80.2363">c_series</text><line style="stroke:#E65100;stroke-width:0.5;" x1="10.5" x2="262.5127" y1="88.3125" y2="88.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="196.0684" x="15.5" y="106.8457">volume_transform : CMatrix&lt;4&gt;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.8545" x="15.5" y="124.4551">volume : CVolume&lt;short&gt;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="168.0547" x="15.5" y="142.0645">structures : list of CSurface</text><line style="stroke:#E65100;stroke-width:1.0;" x1="10.5" x2="262.5127" y1="149.1406" y2="149.1406"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="122.9375" x="15.5" y="167.6738">inherits CDocument</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="242.0127" x="15.5" y="185.2832">NOT observable (no GetChangeEvent)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="218.6338" x="15.5" y="202.8926">serializable (CDocument::Serialize)</text></g><g id="elem_GMN3"><path d="M6,244.6094 L6,336.3672 A0,0 0 0 0 6,336.3672 L266.897,336.3672 A0,0 0 0 0 266.897,336.3672 L266.897,254.6094 L256.897,244.6094 L141,244.6094 L137,210.0694 L133,244.6094 L6,244.6094 A0,0 0 0 0 6,244.6094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M256.897,244.6094 L256.897,254.6094 L266.897,254.6094 L256.897,244.6094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="239.897" x="12" y="263.1045">Glue-light: pure record, no state-machine.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="218.2578" x="12" y="279.4561">Mutator alphabet: on_new_document,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225.4434" x="12" y="295.8076">serialize_load / save, add_structure(S),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="131.498" x="12" y="312.1592">remove_all_structures,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="209.5361" x="12" y="328.5107">set_volume_transform / set_volume.</text></g><!--SRC=[TLB1Rjim3BthAmZqq0H8qhHRUWY206io50FMxP1YLqEMQ5k8B0OIdIuTzk-ZxJHBkquN2UJZuzCZBs5pI0zVuSwJsS8Q2nSSEmgmThgCkbQNi34LrXeAYi0Lmcg3qM62Y8QYXK5D5lquDNMjuw55rICeVODZxygAWNKiaOSJfTYnHrWiSckNoxSqgMkYLDgwiDFI68pNAS4l1NBkjDcMaPfWL-GfBXQHY8NaU2wA0gVvJGyLDeplmZeetiwkfzF_i7PQ7WyxR8iky4DnKzXtM5_1EjRhsUtCJDLlLJcBO5mq7litrZi-G8rSaKrll_U9ERgyOVnYA6pSCyBq3E9TG9OkG56gpnAfqfQUN2YXq3wXybY8qGInSzmw4TZE