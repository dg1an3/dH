<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="563px" preserveAspectRatio="none" style="width:1138px;height:563px;background:#FFFFFF;" version="1.1" viewBox="0 0 1138 563" width="1138px" zoomAndPan="magnify"><title>&lt;&lt;par&gt;&gt; CSimView Cross-field Invariants</title><defs/><g><!--bg-injected--><rect x=\"0\" y=\"0\" width=\"100%\" height=\"100%\" fill=\"#FFFFFF\"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="255.9785" x="434.4463" y="24.5332">&#171;par&#187; CSimView Cross-field Invariants</text><!--class beam_changed_gate--><g id="elem_beam_changed_gate"><rect codeLine="19" fill="#FFFFCC" height="207.5781" id="beam_changed_gate" rx="2.5" ry="2.5" style="stroke:#999900;stroke-width:0.5;" width="327.9912" x="31.5" y="45.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="65.373" x="162.8091" y="63.0664">&#171;constraint&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="131.5576" x="129.7168" y="80.2363">beam_changed_gate</text><line style="stroke:#999900;stroke-width:0.5;" x1="32.5" x2="358.4912" y1="88.3125" y2="88.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="199.2061" x="37.5" y="106.8457">parameters: state.current_beam</text><line style="stroke:#999900;stroke-width:1.0;" x1="32.5" x2="358.4912" y1="113.9219" y2="113.9219"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="96.4893" x="37.5" y="132.4551">Validation-time:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="171.6094" x="37.5" y="150.0645">state.current_beam != none</text><line style="stroke:#999900;stroke-width:1.0;" x1="32.5" x2="358.4912" y1="157.1406" y2="157.1406"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="315.9912" x="37.5" y="175.6738">Enforced by: ui_state_dcg.step//2 [beam_changed]</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="264.6123" x="37.5" y="193.2832">Rationale: OnBeamChanged dereferences</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="270.0332" x="37.5" y="210.8926">m_pCurrentBeam unconditionally (cpp:297)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="191.4404" x="37.5" y="228.502">-- predicate guard prevents the</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="235.0127" x="37.5" y="246.1113">NULL-pointer hazard at the LTS level.</text></g><!--class is_loaded_gate--><g id="elem_is_loaded_gate"><rect codeLine="32" fill="#FFFFCC" height="189.9688" id="is_loaded_gate" rx="2.5" ry="2.5" style="stroke:#999900;stroke-width:0.5;" width="347.4189" x="395" y="54.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="65.373" x="536.0229" y="72.0664">&#171;constraint&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="94.9717" x="521.2236" y="89.2363">is_loaded_gate</text><line style="stroke:#999900;stroke-width:0.5;" x1="396" x2="741.4189" y1="97.3125" y2="97.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="133.834" x="401" y="115.8457">parameters: state.win</text><line style="stroke:#999900;stroke-width:1.0;" x1="396" x2="741.4189" y1="122.9219" y2="122.9219"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="96.4893" x="401" y="141.4551">Validation-time:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="151.7441" x="401" y="159.0645">state.win == view_active</text><line style="stroke:#999900;stroke-width:1.0;" x1="396" x2="741.4189" y1="166.1406" y2="166.1406"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="294.1709" x="401" y="184.6738">Enforced by: ui_state_dcg.step//2 [view_beam],</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="335.4189" x="401" y="202.2832">[view_lightfield], [set_current_beam], [beam_changed]</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="314.3301" x="401" y="219.8926">Rationale: most ON_COMMAND handlers assume</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="270.0742" x="401" y="237.502">OnInitialUpdate has populated renderables.</text></g><!--class ui_cascade_consistency--><g id="elem_ui_cascade_consistency"><rect codeLine="46" fill="#F3E5F5" height="189.9688" id="ui_cascade_consistency" rx="2.5" ry="2.5" style="stroke:#7B1FA2;stroke-width:0.5;" width="354.3711" x="777.5" y="54.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="58.7051" x="925.333" y="72.0664">&#171;invariant&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="151.7578" x="878.8066" y="89.2363">ui_cascade_consistency</text><line style="stroke:#7B1FA2;stroke-width:0.5;" x1="778.5" x2="1130.8711" y1="97.3125" y2="97.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="308.1572" x="783.5" y="115.8457">parameters: state.ui_cascade vs other state fields</text><line style="stroke:#7B1FA2;stroke-width:1.0;" x1="778.5" x2="1130.8711" y1="122.9219" y2="122.9219"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="67.6895" x="783.5" y="141.4551">State-time:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="288.7295" x="783.5" y="159.0645">state.ui_cascade == derive_state-output(state)</text><line style="stroke:#7B1FA2;stroke-width:1.0;" x1="778.5" x2="1130.8711" y1="166.1406" y2="166.1406"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="298.0605" x="783.5" y="184.6738">Preserved by: derive_state/2 at the end of every</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="280.9502" x="783.5" y="202.2832">step//2 rule that mutates beam_renderable_*,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="342.3711" x="783.5" y="219.8926">surface_textured, wireframe, colorwash, current_beam,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.6816" x="783.5" y="237.502">or patient_surface_renderable.</text></g><!--class modelview_dirty_discipline--><g id="elem_modelview_dirty_discipline"><rect codeLine="58" fill="#F3E5F5" height="230.2188" id="modelview_dirty_discipline" rx="2.5" ry="2.5" style="stroke:#7B1FA2;stroke-width:0.5;" width="377" x="7" y="320.1094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="58.7051" x="166.1475" y="337.5664">&#171;invariant&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="165.7441" x="112.6279" y="354.7363">modelview_dirty_discipline</text><line style="stroke:#7B1FA2;stroke-width:0.5;" x1="8" x2="383" y1="362.8125" y2="362.8125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="283.2607" x="13" y="381.3457">parameters: modelview_dirty, beam_changed</text><line style="stroke:#7B1FA2;stroke-width:1.0;" x1="8" x2="383" y1="388.4219" y2="388.4219"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="67.6895" x="13" y="406.9551">State-time:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="148.627" x="13" y="424.5645">modelview_dirty == true</text><text fill="#000000" font-family="sans-serif" font-size="16" font-weight="bold" lengthAdjust="spacing" textLength="365" x="13" y="444.25">&gt; next beam_changed will recompute the matrix</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="154.0752" x="13" y="462.2988">modelview_dirty == false</text><text fill="#000000" font-family="sans-serif" font-size="16" font-weight="bold" lengthAdjust="spacing" textLength="314.3359" x="13" y="481.9844">&gt; after_beam_changed (matrix is current)</text><line style="stroke:#7B1FA2;stroke-width:1.0;" x1="8" x2="383" y1="489.5" y2="489.5"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="284.0674" x="13" y="508.0332">Set by: init, initial_update, toggle_view_beam,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="133.0889" x="13" y="525.6426">toggle_view_lightfield</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="172.0059" x="13" y="543.252">Cleared by: beam_changed</text></g><!--class stale_field_preservation--><g id="elem_stale_field_preservation"><rect codeLine="72" fill="#F3E5F5" height="242.7969" id="stale_field_preservation" rx="2.5" ry="2.5" style="stroke:#7B1FA2;stroke-width:0.5;" width="429.9424" x="419.5" y="313.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="58.7051" x="605.1187" y="331.0664">&#171;invariant&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.8682" x="560.5371" y="348.2363">stale_field_preservation</text><line style="stroke:#7B1FA2;stroke-width:0.5;" x1="420.5" x2="848.4424" y1="356.3125" y2="356.3125"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="417.9424" x="425.5" y="374.8457">parameters: patient_enabled, slider_pos, beam_renderable_pointer</text><line style="stroke:#7B1FA2;stroke-width:1.0;" x1="420.5" x2="848.4424" y1="381.9219" y2="381.9219"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="67.6895" x="425.5" y="400.4551">State-time:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="244.3848" x="425.5" y="418.0645">patient_enabled is initialized in ctor and</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="267.6953" x="425.5" y="435.6738">never read or written (m_bPatientEnabled).</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="264.5918" x="425.5" y="453.2832">slider_pos is declared but never accessed.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="286.4121" x="425.5" y="470.8926">beam_renderable_pointer is initialized to none</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="282.8164" x="425.5" y="488.502">and never reassigned -- OnViewBeam's deref</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="278.5713" x="425.5" y="506.1113">is a known crash hazard preserved verbatim.</text><line style="stroke:#7B1FA2;stroke-width:1.0;" x1="420.5" x2="848.4424" y1="513.1875" y2="513.1875"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="249.0059" x="425.5" y="531.7207">Preserved by: every step//2 rule (no rule</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.8477" x="425.5" y="549.3301">writes any of these fields).</text></g><!--SRC=[bLRRRjiu47tNLymY3t4As-rcKHGraW1Rjmy5SiEcxKiH23H9oKGaKY0fkswn_xw7f6nBJfDk1VX2QUPmvfoPeOxfRkEkBkcMMLPBRnMdzugLM6J7DBV6kKcXP2L8wHMpYcdlY6b1t6ZdBLDXNOSVVAIWnORyKjBbfxjfbddbAqbdPmsp5nSqlrFr5oNN0zIFEzGiSmzADo4CuXLpZdvaXEiTum-bDQqMSrCPUtQstncWHmKkpfEbiKBQdrc5w-WjhbUlVewvIouO7nL_oTV5wyUO0wk8-MRnPy5Eit-pfHAIkBAyakc_h1k_8J2wDCBrKdDB9inQwP8ALZcPUTEGDxGmtfkQXBAIUsLq1lOdambzOPKIBDoPU5NB0UsZaddfJe9TbYNA5fBLELyoNKgHXyTqm4JYj4bYI-jcv3pCfhorLcgV1u1e0ipmSx3_BDvyx49_d9CsMlPTF-Z2M1vhOaQjogDNBdWvTLusBr-UqjT-kFVHwP-u5wlaZ6xqEpoUfwS45MI1Z-RIHSiwR-OfWc16hKQUGYNlQaCZtZIpqxTlJhgGgB5IA1ueALjcHLYlPA0HzHfjhZzVNauQ0vwafINx7eoOtvOpLJ2lff2wergvl39C_2RFKFv_qWjBEZ-d5JecPwY9rU-I6pq3m_VZw99kLAfS-jXxzsFwwgJF-pg6Uy-AKXldwUOwdzzSNVrz_HuyQL4XFm8bRPr2lD4VDOHWrUT616gMp55ZchR2GX3sWfPiKKaNsKnrVXVYJoNU6pGZYEIaNQN10W4iMgg5QUYVaEYW-443Puv3apneeM2W-OQ6VVkKC7jdMZaoKDsc9nJ9Sdtozy7s1UiXG3Va2CcIBXFJ-gRrexWuwIFTzlAR3NoWO5Tyu8jCaRBljaiAsnRJrIzX5ZcHNVll2SvV9ELTQml6PUxbDz-Y3SQqnfmf0WLZJ1JCjZLpI_pjLKBoD1PKUHLkRa7syBrcg8sGLQmlJ32_mRVZggbm9FoI_WFNyM26FSVwWMCWtTisbI1XTK4Q-GxWa7TLeGAvgQ67ZFJM38VUjwSGqv3UGx82KUS3p552m43O4ZYG-4xwAAv2JupZDpeZRsDhZ37won92xNfrtEsLhlxJVUD6atabcUtgPi3OJXEK4NoZHzxrKUpZNogoLLpge3AgnM588Ul6kF6Z4ki6vdD27U05eZeQrFUmrCGz2WsJf4jUXrg7J4o40bnRvT79u3bVt2Qe3mdfP9hAUnTUW1OIwKTcMjyXCOv3mqcHp9_8u30i7Cgx4utYAyykBETK6LvsCBTkT7Yb2IVGiKjdLES0D4OFsgoHdKLtRK-K_KG3s0BfrDEd1qAQU8D-7saJ_qJhG8qCxsERC25GpMuxhav2S_u7]--></g></svg>